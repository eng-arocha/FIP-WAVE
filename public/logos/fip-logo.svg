<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 70" fill="none">
  <!-- Diamond shape: top vertex (30,2), left (2,40), right (58,40), bottom (30,66) -->
  <!-- Top triangle: dark navy -->
  <polygon points="30,2 2,40 58,40" fill="#1E2B7A"/>
  <!-- Bottom-left triangle: gray/silver -->
  <polygon points="2,40 30,66 30,40" fill="#9AABBE"/>
  <!-- Bottom-right triangle: medium blue -->
  <polygon points="58,40 30,66 30,40" fill="#4A7EC8"/>
  <!-- White dividing lines through center -->
  <line x1="30" y1="2" x2="30" y2="66" stroke="white" stroke-width="1.5"/>
  <line x1="2" y1="40" x2="58" y2="40" stroke="white" stroke-width="1.5"/>
  <!-- FIP text -->
  <text x="74" y="32" font-family="Arial Black, Arial, sans-serif" font-size="28" font-weight="900" fill="#1E2B7A">FIP</text>
  <!-- ENGENHARIA text -->
  <text x="75" y="54" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="600" fill="#4A7EC8" letter-spacing="2">ENGENHARIA</text>
</svg>
